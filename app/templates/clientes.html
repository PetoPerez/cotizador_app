<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
</head>
<body>
<div class="layout">
  <div id="sidebar-root"></div>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Clientes</div>
        <div class="page-subtitle">Directorio de clientes y razones sociales</div>
      </div>
      <button class="btn btn-primary" onclick="openModal()">+ Nuevo cliente</button>
    </div>

    <div id="alert-box" class="alert hidden"></div>

    <div class="card">
      <div class="search-bar">
        <input type="text" class="form-control" id="search" placeholder="Buscar por nombre, teléfono o email..." oninput="filtrar()">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre / Razón social</th>
              <th>Teléfono</th>
              <th>Email</th>
              <th>Registro</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tabla-body">
            <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text3)">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal" style="max-width:720px">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nuevo cliente</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-alert" class="alert hidden"></div>

    <div class="form-group">
      <label class="form-label">Nombre o razón social *</label>
      <input type="text" class="form-control" id="f-nombre" placeholder="Empresa S.A. de C.V.">
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Teléfono de contacto</label>
        <input type="text" class="form-control" id="f-telefono" placeholder="33 1234 5678">
      </div>
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" class="form-control" id="f-email" placeholder="contacto@empresa.com">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:140px 1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Atención a</label>
        <select class="form-control" id="f-atencion-titulo">
          <option value="">—</option>
          <option value="Lic.">Lic.</option>
          <option value="Ing.">Ing.</option>
          <option value="Mtro.">Mtro.</option>
          <option value="Dr.">Dr.</option>
          <option value="Arq.">Arq.</option>
          <option value="Cap.">Cap.</option>
          <option value="Tte.">Tte.</option>
          <option value="Sr.">Sr.</option>
          <option value="Sra.">Sra.</option>
          <option value="Srta.">Srta.</option>
          <option value="Jefe">Jefe</option>
          <option value="Gerente">Gerente</option>
        </select>
      </div>
      <div class="form-group" style="grid-column:span 2">
        <label class="form-label">Nombre del contacto</label>
        <input type="text" class="form-control" id="f-atencion-nombre" placeholder="Juan Pérez García">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">RFC</label>
        <input type="text" class="form-control" id="f-rfc" placeholder="XAXX010101000" maxlength="20" style="text-transform:uppercase">
      </div>
      <div class="form-group">
        <label class="form-label">País</label>
        <input type="text" class="form-control" id="f-pais" placeholder="México" value="México">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group">
        <label class="form-label">Ciudad</label>
        <input type="text" class="form-control" id="f-ciudad" placeholder="Guadalajara">
      </div>
      <div class="form-group">
        <label class="form-label">Estado</label>
        <input type="text" class="form-control" id="f-estado" placeholder="Jalisco">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Domicilio de la empresa</label>
      <textarea class="form-control" id="f-domicilio-empresa" rows="2" placeholder="Calle, número, colonia, C.P."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Domicilio de entrega</label>
      <textarea class="form-control" id="f-domicilio-entrega" rows="2" placeholder="Calle, número, colonia, C.P."></textarea>
    </div>

    <div class="flex gap-8 mt-16" style="justify-content:flex-end">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-save" onclick="guardar()">Guardar</button>
    </div>
  </div>
</div>

<script src="api.js?v=3"></script>
<script>
requireAuth();
document.getElementById('sidebar-root').innerHTML = renderSidebar('clientes');

let clientes = [];
let editId = null;

async function cargar() {
  try {
    clientes = await apiFetch('/clientes/');
    renderTabla(clientes);
  } catch (e) {
    showAlert(e.message);
  }
}

function filtrar() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtrados = clientes.filter(c =>
    c.nombre_razon_social.toLowerCase().includes(q) ||
    (c.telefono || '').toLowerCase().includes(q) ||
    (c.email || '').toLowerCase().includes(q)
  );
  renderTabla(filtrados);
}

function renderTabla(data) {
  const tbody = document.getElementById('tabla-body');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text3)">Sin clientes registrados</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(c => `
    <tr>
      <td><strong style="color:var(--text)">${c.nombre_razon_social}</strong></td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${c.telefono || '—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${c.email || '—'}</td>
      <td style="color:var(--text3)">${formatDate(c.created_at)}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="editar('${c.id}')">Editar</button>
      </td>
    </tr>
  `).join('');
}

const CAMPOS = [
  'f-nombre','f-telefono','f-email',
  'f-atencion-titulo','f-atencion-nombre',
  'f-rfc','f-pais','f-ciudad','f-estado',
  'f-domicilio-empresa','f-domicilio-entrega'
];

function openModal(id = null) {
  editId = id;
  document.getElementById('modal-title').textContent = id ? 'Editar cliente' : 'Nuevo cliente';
  if (!id) {
    CAMPOS.forEach(f => document.getElementById(f).value = '');
    document.getElementById('f-pais').value = 'México';
  }
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editId = null;
}

function editar(id) {
  const c = clientes.find(x => x.id === id);
  if (!c) return;
  document.getElementById('f-nombre').value = c.nombre_razon_social;
  document.getElementById('f-telefono').value = c.telefono || '';
  document.getElementById('f-email').value = c.email || '';
  document.getElementById('f-atencion-titulo').value = c.atencion_titulo || '';
  document.getElementById('f-atencion-nombre').value = c.atencion_nombre || '';
  document.getElementById('f-rfc').value = c.rfc || '';
  document.getElementById('f-pais').value = c.pais || 'México';
  document.getElementById('f-ciudad').value = c.ciudad || '';
  document.getElementById('f-estado').value = c.estado || '';
  document.getElementById('f-domicilio-empresa').value = c.domicilio_empresa || '';
  document.getElementById('f-domicilio-entrega').value = c.domicilio_entrega || '';
  openModal(id);
}

async function guardar() {
  const body = {
    nombre_razon_social: document.getElementById('f-nombre').value.trim(),
    telefono: document.getElementById('f-telefono').value.trim() || null,
    email: document.getElementById('f-email').value.trim() || null,
    atencion_titulo: document.getElementById('f-atencion-titulo').value || null,
    atencion_nombre: document.getElementById('f-atencion-nombre').value.trim() || null,
    rfc: document.getElementById('f-rfc').value.trim().toUpperCase() || null,
    pais: document.getElementById('f-pais').value.trim() || 'México',
    ciudad: document.getElementById('f-ciudad').value.trim() || null,
    estado: document.getElementById('f-estado').value.trim() || null,
    domicilio_empresa: document.getElementById('f-domicilio-empresa').value.trim() || null,
    domicilio_entrega: document.getElementById('f-domicilio-entrega').value.trim() || null,
  };

  if (!body.nombre_razon_social) {
    showAlert('El nombre o razón social es requerido', 'danger', 'modal-alert');
    return;
  }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  try {
    if (editId) {
      await apiFetch(`/clientes/${editId}`, { method: 'PUT', body: JSON.stringify(body) });
    } else {
      await apiFetch('/clientes/', { method: 'POST', body: JSON.stringify(body) });
    }
    closeModal();
    await cargar();
    showAlert('Cliente guardado correctamente', 'success');
  } catch (e) {
    showAlert(e.message, 'danger', 'modal-alert');
  } finally {
    btn.disabled = false;
  }
}

cargar();
loadTipoCambio();
</script>
</body>
</html>
